<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub issues</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="">
    
    <main class="bg-base-200">
      
       <header class="">
           <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1"> 
                <a class="btn btn-ghost text-xl"><i class="fa-brands fa-github"></i>GitHub Issues Tracker</a>  
            </div>
            <div class="flex gap-2">               
             <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues..." />
                </label>  
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>    
            </div>
            </div>
       </header>  
       <section class="w-11/12 mx-auto">
           <div class="navbar bg-base-100 shadow-sm mt-8 p-5 space-x-4">
              <button class="btn btn-primary">All</button>
              <button class="btn">Open</button>
              <button class="btn">Closed</button>
            </div>
       </section>
       <section class="w-11/12 mx-auto">
           <div class="navbar bg-base-100 shadow-sm mt-8 p-5 space-x-4 flex justify-between">
                <div class="flex items-center gap-3">
                    <div>
                    <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-bold text-2xl"><span>50</span> issues</h2>
                        <p class="text-[#64748B] text-xl">Track and manage your project issues</p>
                    </div> 
                </div>
                <div class="space-x-4">
                    <span><i class="fa-solid fa-circle text-green-500"></i>Open</span>
                    <span><i class="fa-solid fa-circle text-purple-500"></i>Closed</span>
                </div>
           </div>
       </section>
       
       <section class="grid grid-cols-4 w-11/12 mx-auto mt-11">
            
               <div class="bg-white border-y-green-500 rounded-xl border-y-[5px] p-3 space-y-4">
               <div class="flex justify-between">
                  <span><img src="./assets/Open-Status.png" alt=""></span>
                  <span class="btn">High</span>
               </div>
               <h1 class="text-2xl font-bold">Fix navigation menu on mobile devices</h1>
               <p class="text-xl text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices...</p>
               <div class="">
                   
               </div>
               <hr class="opacity-10">
               <p>#1 by john_doe</p>
               <p>1/15/2024</p>
            </div>
            
       </section>
         
            
    </main>

</body>
</html>
