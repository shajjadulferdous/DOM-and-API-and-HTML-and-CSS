<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub issues</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="">
    
    <main class="bg-base-200">    
       <header class="">
           <div class="navbar bg-base-100 shadow-sm flex flex-col sm:flex-row sm:items-center sm:justify-between">
            <div class="flex-1"> 
                <a class="btn btn-ghost text-xl"><i class="fa-brands fa-github"></i>GitHub Issues Tracker</a>  
            </div>
            <div class="flex gap-2">               
             <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input id="search-input" type="search" required placeholder="Search issues..." />
                </label>  
                <button id="search-issues" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>    
            </div>
            </div>
       </header>  
       <section class="w-11/12 mx-auto">
           <div id="btn-containers"  class="navbar bg-base-100 shadow-sm mt-8 p-5 space-x-4">
              <button id="all" onclick="selectBtn('all')" class="btn btn-primary">All</button>
              <button id="open" onclick="selectBtn('open')" class="btn">Open</button>
              <button id="closed" onclick="selectBtn('closed')" class="btn">Closed</button>
            </div>
       </section>
       <section class="w-11/12 mx-auto">
           <div class="navbar bg-base-100 shadow-sm mt-8 p-5 space-x-4 flex justify-between">
                <div class="flex items-center gap-3 flex-1">
                    <div>
                    <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-bold text-2xl"><span id="issues-count">50</span> issues</h2>
                        <p class="text-[#64748B] text-xl">Track and manage your project issues</p>
                    </div> 
                </div>
                <div class="space-x-4 flex flex-col sm:flex-row flex-1 justify-end">
                    <span><i class="fa-solid fa-circle text-green-500"></i>Open</span>
                    <span><i class="fa-solid fa-circle text-purple-500"></i>Closed</span>
                </div>
           </div>
       </section>
       
       <section id="card-container" class=" w-11/12 mx-auto mt-11">      
               
       </section>
        
       <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <!-- <h3 class="text-lg font-bold">Hello!</h3>
            <p class="py-4">Press ESC key or click the button below to close</p> -->
            <div id="modal_add">

            </div>
            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
        </dialog>
            
    </main>
    <script src="./script/test.script.js"></script>
</body>
</html>
