<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub issues</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css.css">
</head>
<body>
    
    <main class="bg-base-200 h-[100vh] flex justify-center items-center ">
        <section class="flex justify-center items-center flex-col  bg-white w-2/5 rounded-xl px-12 py-28">
            <div class="flex justify-center items-center mb-5">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h1 class="font-bold text-3xl mb-2">GitHub Issues Tracker</h1>
            <p class="text-[#64748B]">Sign in to manage your issues</p>

            <fieldset class="fieldset rounded-box w-4/5 p-4 ">

            <label class="label text-[16px]">Username</label>
            <input type="text" class="input outline-none w-full" placeholder="Enter Username" />
            <label class="label text-[16px]">Password</label>
            <input type="password" class="input outline-none w-full" placeholder="Enter Password" />
            <button class="btn btn-primary mt-4">Sign In</button>

            </fieldset>
           
            
        </section>
    </main>


    <script src="script.js"></script>
</body>
</html>
